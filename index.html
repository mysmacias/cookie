<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="theme-color" content="#496251" />
    <link rel="icon" href="/app-icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="description" content="A curated recipe app for the modern home cook." />
    <title>COOKIE</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Apply the saved theme before paint to avoid a flash and to keep the
      // body background in sync with light/dark mode.
      (function () {
        try {
          var pref = localStorage.getItem('cookie_theme') || 'system';
          var dark = pref === 'dark' || (pref === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);
          document.documentElement.classList.toggle('dark-dim', dark);
          document.body.style.backgroundColor = dark ? '#1b1c19' : '#fbf9f4';
        } catch (e) {
          document.body.style.backgroundColor = '#fbf9f4';
        }
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
