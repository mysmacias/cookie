<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>App icon raster source</title>
    <style>
      @font-face {
        font-family: 'Newsreader';
        font-style: italic;
        font-weight: 200 800;
        font-display: block;
        src: url('../public/fonts/newsreader-italic-latin.woff2') format('woff2');
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        width: 1024px;
        height: 1024px;
        background: #fbf9f4;
        overflow: hidden;
      }
      #mark {
        width: 1024px;
        height: 1024px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: 'Newsreader', serif;
        font-style: italic;
        font-weight: 700;
        font-size: 600px;
        letter-spacing: -0.06em;
        color: #496251;
        line-height: 1;
        user-select: none;
      }
    </style>
  </head>
  <body>
    <div id="mark">C</div>
  </body>
</html>
